# Keymap-drawer: A visualizer for keyboard keymaps  
# https://keymap-drawer.streamlit.app/
layout:
  qmk_keyboard: crkbd/rev4_1
  layout_name: LAYOUT_split_3x6_3
layers:
  DEF:
    - ["Esc", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", $$mdi:backspace-outline$$]
    - ["Gui", "A", "S", "D", "F", "G", "H", "J", "K", "L", ";", $$mdi:keyboard-return$$]
    - ["Shift", "Z", "X", "C", "V", "B", "N", "M", ",", ".", "/", "Shift"]
    - {h: Alt, t: Del }
    - {h: Ctrl, t: $$mdi:keyboard-tab$$}
    - {h: NAV, t: Esc}
    - {h: SYM, t: $$mdi:backspace-outline$$}
    - $$mdi:keyboard-space$$
    - {h: Alt, t: $$mdi:keyboard-return$$}
  NAV:
    - [{t: "Esc", type: trans}, 1, 2, 3, 4, 5, 6, 7, 8, 9, 0, {t: "Bksp", type: trans}]
    - [{t: "Gui", type: trans}, "OSM Shift", "OSM Alt", "OSM Ctrl", "OSM Gui", null, $$mdi:chevron-left$$, $$mdi:chevron-down$$, $$mdi:chevron-up$$, $$mdi:chevron-right$$, {s: '"', t: "'"}, {t: "Enter", type: trans}] 
    - [{t: "Shift", type: trans}, null, null, null, null, null, null, null, "<", ">", "?", {t: "Shift", type: trans}]
    - {h: Alt, t: Del }
    - {h: Ctrl, t: $$mdi:keyboard-tab$$}
    - {type: held}
    - {h: MEDIA, t: $$mdi:backspace-outline$$}
    - $$mdi:keyboard-space$$
    - {h: Alt, t: $$mdi:keyboard-return$$}
  SYM:
    - [{t: "Esc", type: trans}, "[", "]", "{", "}", "%", "@", "&", "*", "-", "+", {t: "Bksp", type: trans}]
    - [{t: "Gui", type: trans}, "!", "=", "(", ")", "$", "^", "OSM Gui", "OSM Ctrl", "OSM Alt", "OSM Shift", {t: "Enter", type: trans}]
    - [{t: "Shift", type: trans}, "<", "|", "~", ">", "\\", "â‚¬", "#", ":", "_", "/", {t: "Shift", type: trans}]
    - {h: Alt, t: Del }
    - {h: Ctrl, t: $$mdi:keyboard-tab$$}
    - {h: NUM, t: Esc}
    - {type: held}
    - $$mdi:keyboard-space$$
    - {h: Alt, t: $$mdi:keyboard-return$$}
  NUM:
    - [null, "_", "â‚¬", "#", "$", "%", "/", "7", "8", "9", "-", null]
    - [null, ":", "=", "(", ")", null, "*", "4", "5", "6", "+", null]
    - [null, null, null, null, null, null, ",", "1", "2", "3", ".", null]
    - {h: Alt, t: Del }
    - {h: Ctrl, t: $$mdi:keyboard-tab$$}
    - {type: held}
    - {h: MEDIA, t: $$mdi:backspace-outline$$, type: ghost}
    - $$mdi:keyboard-space$$
    - {h: Alt, t: $$mdi:keyboard-return$$}
  MEDIA:
    - [null, null, $$mdi:volume-minus$$, $$mdi:volume-mute$$, $$mdi:volume-plus$$, null, null, "RBG M+","RGB TOG", "RGB M-", null, "Reboot"]
    - [null, null, $$mdi:skip-previous$$, $$mdi:play-pause$$, $$mdi:skip-next$$, null, null, "RGB Hue+", "RGB Sat+", "RGB Bri+", null, null]
    - [null, null,  $$mdi:weather-sunset-down$$, null, $$mdi:weather-sunset-up$$, null, null, "RGB Hue-", "RGB Sat-", "RGB Bri-", null, null]
    - {h: Alt, t: Del }
    - {h: Ctrl, t: $$mdi:keyboard-tab$$}
    - {type: held}
    - {type: held}
    - $$mdi:keyboard-space$$
    - {h: Alt, t: $$mdi:keyboard-return$$}
combos:
  - {p: [3, 4],   k: "`", l: ["DEF"]}
  - {p: [15, 16], k: '"', l: ["DEF"]}
  - {p: [19, 20], k: ":", l: ["DEF"]}
  - {p: [19, 20], k: ":", l: ["NUM"]}
  - {p: [27, 28], k: "'", l: ["DEF"]}
  - {p: [31, 32], k: "0", l: ["NUM"]}
draw_config:
  glyph_tap_size: 18
